<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cuenta Atrás del Curso</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,900;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0f;
    --surface: #16161a;
    --accent: #f5c842;
    --accent2: #e8533d;
    --text: #f0ede6;
    --muted: #5a5760;
    --border: #2a2830;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Fondo con ruido y gradiente */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 10%, rgba(245,200,66,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 80% 90%, rgba(232,83,61,0.06) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* Partículas flotantes */
  .particles {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .particle {
    position: absolute;
    border-radius: 50%;
    opacity: 0;
    animation: float-up linear infinite;
  }

  @keyframes float-up {
    0%   { transform: translateY(110vh) scale(0); opacity: 0; }
    10%  { opacity: 0.6; }
    90%  { opacity: 0.3; }
    100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
  }

  /* Contenedor principal */
  .container {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    padding: 2rem;
    max-width: 700px;
    width: 100%;
    text-align: center;
  }

  /* Etiqueta superior */
  .label-top {
    font-size: 0.7rem;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 1.5rem;
    opacity: 0;
    animation: fade-in 0.8s ease forwards 0.2s;
  }

  @keyframes fade-in {
    to { opacity: 1; }
  }

  /* Número grande */
  .number-wrap {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 0.2rem;
  }

  .number {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: clamp(9rem, 30vw, 18rem);
    line-height: 1;
    color: transparent;
    -webkit-text-stroke: 2px var(--accent);
    position: relative;
    animation: number-appear 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    opacity: 0;
    transform: scale(0.5) translateY(40px);
    letter-spacing: -0.03em;
  }

  .number::after {
    content: attr(data-num);
    position: absolute;
    inset: 0;
    color: var(--accent);
    opacity: 0;
    animation: glow-fill 1.8s ease forwards 0.6s;
    filter: blur(0px);
  }

  @keyframes number-appear {
    0%   { opacity: 0; transform: scale(0.4) translateY(60px); }
    60%  { opacity: 1; transform: scale(1.04) translateY(-4px); }
    80%  { transform: scale(0.98) translateY(2px); }
    100% { opacity: 1; transform: scale(1) translateY(0); }
  }

  @keyframes glow-fill {
    0%   { opacity: 0; }
    50%  { opacity: 0.15; filter: blur(20px); }
    100% { opacity: 0.08; filter: blur(8px); }
  }

  /* Etiqueta "días" */
  .dias-label {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: clamp(1.4rem, 5vw, 2.8rem);
    color: var(--accent);
    opacity: 0;
    animation: fade-in 0.8s ease forwards 0.9s;
    margin-bottom: 1rem;
  }

  /* Separador */
  .sep {
    width: 60px;
    height: 1px;
    background: var(--border);
    margin: 1.2rem auto;
    position: relative;
    opacity: 0;
    animation: fade-in 0.8s ease forwards 1s;
  }
  .sep::before {
    content: '';
    position: absolute;
    left: 50%;
    top: 0;
    transform: translateX(-50%);
    width: 0;
    height: 1px;
    background: var(--accent);
    animation: sep-expand 1s ease forwards 1.2s;
  }
  @keyframes sep-expand {
    to { width: 100%; }
  }

  /* Frase del día */
  .phrase-wrap {
    opacity: 0;
    animation: phrase-in 1s ease forwards 1.3s;
    min-height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  @keyframes phrase-in {
    0%   { opacity: 0; transform: translateY(20px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  .phrase {
    font-size: clamp(1rem, 2.5vw, 1.3rem);
    font-weight: 300;
    line-height: 1.6;
    color: var(--text);
    max-width: 520px;
    padding: 0 1rem;
  }

  .phrase em {
    font-style: normal;
    color: var(--accent);
    font-weight: 500;
  }

  /* Subtítulo del curso */
  .subtitle {
    margin-top: 2rem;
    font-size: 0.68rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--muted);
    opacity: 0;
    animation: fade-in 0.8s ease forwards 1.6s;
    line-height: 2;
  }

  .subtitle span {
    color: var(--accent2);
  }

  /* Barra de progreso */
  .progress-wrap {
    width: 100%;
    max-width: 420px;
    margin-top: 1.8rem;
    opacity: 0;
    animation: fade-in 0.8s ease forwards 1.8s;
  }

  .progress-meta {
    display: flex;
    justify-content: space-between;
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.5rem;
  }

  .progress-bar {
    width: 100%;
    height: 2px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 2px;
    animation: bar-grow 1.5s ease forwards 2s;
    transform-origin: left;
    width: 0%;
  }

  @keyframes bar-grow {
    to { width: var(--progress-pct); }
  }

  /* Pulso sutil en el número */
  .number-wrap .pulse {
    position: absolute;
    width: 100%;
    height: 100%;
    border: 1px solid var(--accent);
    opacity: 0;
    border-radius: 4px;
    animation: pulse-ring 3s ease infinite 2s;
    pointer-events: none;
  }

  @keyframes pulse-ring {
    0%   { opacity: 0; transform: scale(0.96); }
    30%  { opacity: 0.12; }
    100% { opacity: 0; transform: scale(1.06); }
  }

</style>
</head>
<body>

<div class="particles" id="particles"></div>

<div class="container">
  <p class="label-top">Cuenta atrás · Fin del curso</p>

  <div class="number-wrap">
    <div class="pulse"></div>
    <div class="number" id="mainNumber" data-num="0">0</div>
  </div>

  <div class="dias-label" id="diasLabel">días</div>

  <div class="sep"></div>

  <div class="phrase-wrap">
    <p class="phrase" id="phrase">—</p>
  </div>

  <p class="subtitle" id="subtitle"></p>

  <div class="progress-wrap">
    <div class="progress-meta">
      <span>Inicio del curso</span>
      <span id="progressPct">0%</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>
</div>

<script>
  const frases = [
    "Hoy puede ser un gran día… o al menos un día con café.",
    "Paso a paso se llega lejos. Corriendo también, pero cansa más.",
    "Hazlo por tu yo del futuro, que bastante tendrá con sobrevivir al lunes.",
    "No necesitas tenerlo todo claro, solo empezar sin tropezar demasiado.",
    "Si el plan A falla, recuerda que el abecedario tiene muchas letras.",
    "Hoy toca brillar, aunque sea con ojeras.",
    "Pequeños avances también cuentan, incluso si son en pijama.",
    "Confía en ti: has sobrevivido al despertador.",
    "No dejes para mañana lo que puedas hacer hoy… salvo ordenar archivos.",
    "Cada día es una nueva oportunidad para hacerlo mejor o para disimular con estilo.",
    "El éxito empieza con una decisión. Y a veces con una siesta estratégica.",
    "No estás procrastinando: estás cargando creatividad.",
    "Sé constante. Las gotas llenan vasos, aunque algunas caigan en el teclado.",
    "Hoy es buen día para avanzar, aunque sea en modo tortuga.",
    "Tus sueños no se cumplen solos. Pero tampoco hace falta correr en chanclas.",
    "Respira, organiza y ataca. Pero primero guarda el documento.",
    "Puedes con esto. Ya has superado reuniones que podían haber sido un correo.",
    "La motivación va y viene; la disciplina se queda… aunque a veces llegue tarde.",
    "Hazlo con miedo, con dudas o con sueño, pero hazlo.",
    "Hoy no busques la perfección: busca no cerrar la pestaña equivocada.",
    "La actitud lo cambia todo, excepto la contraseña olvidada.",
    "Un pequeño progreso al día mantiene lejos al caos. Más o menos.",
    "No hace falta ser perfecto para empezar; de hecho, ayuda no serlo.",
    "Si hoy todo sale raro, al menos tendrás anécdota.",
    "El calendario dice que hoy toca avanzar. No le discutamos.",
    "La energía positiva no paga facturas, pero ayuda a abrir el portátil.",
    "Sigue adelante: incluso los lunes terminan pasando.",
    "No subestimes el poder de empezar cinco minutos. A veces engaña al cerebro.",
    "Tú puedes. Y si no, improvisa con confianza.",
    "Hoy ponle ganas. Si no hay ganas, ponle música."
  ];

  // Fechas
  const today = new Date();
  today.setHours(0, 0, 0, 0);

  const endCourse = new Date(2025, 5, 19); // 19 junio 2025 — ajusta el año si es 2026
  endCourse.setHours(0, 0, 0, 0);

  const endCenter = new Date(2025, 5, 30); // 30 junio 2025
  endCenter.setHours(0, 0, 0, 0);

  // Detectar el año correcto automáticamente
  const nowYear = today.getFullYear();
  const testEnd = new Date(nowYear, 5, 19);
  testEnd.setHours(0,0,0,0);
  if (testEnd < today) {
    endCourse.setFullYear(nowYear + 1);
    endCenter.setFullYear(nowYear + 1);
  } else {
    endCourse.setFullYear(nowYear);
    endCenter.setFullYear(nowYear);
  }

  const msDay = 1000 * 60 * 60 * 24;

  function getDaysLeft(target) {
    const diff = target - today;
    return diff > 0 ? Math.ceil(diff / msDay) : 0;
  }

  const daysToEnd    = getDaysLeft(endCourse);
  const daysToCenter = getDaysLeft(endCenter);

  // Elegir frase basada en el día del año (consistente cada día)
  const dayOfYear = Math.floor((today - new Date(today.getFullYear(), 0, 0)) / msDay);
  const frase = frases[dayOfYear % frases.length];

  // Progreso: asumimos inicio del curso ~septiembre del año anterior
  const courseStart = new Date(endCourse.getFullYear() - 1, 8, 1);
  const totalDays   = (endCourse - courseStart) / msDay;
  const donedays    = (today - courseStart) / msDay;
  const pct         = Math.min(100, Math.max(0, Math.round((donedays / totalDays) * 100)));

  // Animación del número (cuenta hacia arriba)
  const numEl = document.getElementById('mainNumber');
  const labelEl = document.getElementById('diasLabel');

  function animateCount(target, duration = 1400) {
    const start = performance.now();
    const from  = Math.max(0, target - Math.min(target, 30));
    function step(now) {
      const elapsed  = now - start;
      const progress = Math.min(1, elapsed / duration);
      const ease     = 1 - Math.pow(1 - progress, 4);
      const current  = Math.round(from + (target - from) * ease);
      numEl.textContent  = current;
      numEl.dataset.num  = current;
      if (progress < 1) requestAnimationFrame(step);
      else {
        numEl.textContent = target;
        numEl.dataset.num = target;
      }
    }
    setTimeout(() => requestAnimationFrame(step), 300);
  }

  animateCount(daysToEnd);

  // Frase con highlight en palabras clave
  const highlight = ['brillar','avanzar','puedes','constante','hazlo','confía','sigue','ponle','empezar'];
  let phraseHTML = frase;
  highlight.forEach(w => {
    const re = new RegExp(`\\b(${w})\\b`, 'gi');
    phraseHTML = phraseHTML.replace(re, '<em>$1</em>');
  });
  document.getElementById('phrase').innerHTML = phraseHTML;

  // Subtítulo
  const opts = { day: 'numeric', month: 'long' };
  document.getElementById('subtitle').innerHTML =
    `Fin del curso: <span>${endCourse.toLocaleDateString('es-ES', opts)}</span>
     &nbsp;&nbsp;·&nbsp;&nbsp; Centro hasta: <span>${endCenter.toLocaleDateString('es-ES', opts)}</span>
     &nbsp;&nbsp;·&nbsp;&nbsp; Al centro: <span>${daysToCenter} días</span>`;

  // Barra de progreso
  const fill = document.getElementById('progressFill');
  fill.style.setProperty('--progress-pct', pct + '%');
  document.getElementById('progressPct').textContent = pct + '%';

  // Partículas
  const container = document.getElementById('particles');
  const colors = ['#f5c842', '#e8533d', '#f0ede6'];
  for (let i = 0; i < 22; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random() * 4 + 2;
    p.style.cssText = `
      width: ${size}px; height: ${size}px;
      left: ${Math.random() * 100}%;
      background: ${colors[Math.floor(Math.random() * colors.length)]};
      animation-duration: ${10 + Math.random() * 20}s;
      animation-delay: ${Math.random() * 12}s;
      opacity: 0;
    `;
    container.appendChild(p);
  }

  // Si el curso ya terminó
  if (daysToEnd === 0) {
    numEl.textContent = '🎉';
    numEl.style.fontSize = 'clamp(6rem, 20vw, 12rem)';
    labelEl.textContent = '¡Curso terminado!';
    document.getElementById('phrase').textContent = '¡Lo has conseguido! Ahora a disfrutar (y a no mirar el correo).';
  }
</script>
</body>
</html>
