<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cuenta Atrás del Curso</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,900;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0f;
    --surface: #16161a;
    --accent: #f5c842;
    --accent2: #e8533d;
    --text: #f0ede6;
    --muted: #5a5760;
    --border: #2a2830;
    --spotify: #1DB954;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    overflow-x: hidden;
    position: relative;
    padding-bottom: 4rem;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 10%, rgba(245,200,66,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 80% 90%, rgba(232,83,61,0.06) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .particles {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .particle {
    position: absolute;
    border-radius: 50%;
    opacity: 0;
    animation: float-up linear infinite;
  }
  @keyframes float-up {
    0%   { transform: translateY(110vh) scale(0); opacity: 0; }
    10%  { opacity: 0.6; }
    90%  { opacity: 0.3; }
    100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
  }

  .container {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    padding: 2rem;
    max-width: 700px;
    width: 100%;
    text-align: center;
  }

  .label-top {
    font-size: 0.7rem;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 1.5rem;
    opacity: 0;
    animation: fade-in 0.8s ease forwards 0.2s;
  }
  @keyframes fade-in { to { opacity: 1; } }

  .number-wrap {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 0.2rem;
  }

  .number {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: clamp(9rem, 30vw, 18rem);
    line-height: 1;
    color: transparent;
    -webkit-text-stroke: 2px var(--accent);
    position: relative;
    animation: number-appear 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    opacity: 0;
    transform: scale(0.5) translateY(40px);
    letter-spacing: -0.03em;
  }
  .number::after {
    content: attr(data-num);
    position: absolute;
    inset: 0;
    color: var(--accent);
    opacity: 0;
    animation: glow-fill 1.8s ease forwards 0.6s;
  }
  @keyframes number-appear {
    0%   { opacity: 0; transform: scale(0.4) translateY(60px); }
    60%  { opacity: 1; transform: scale(1.04) translateY(-4px); }
    80%  { transform: scale(0.98) translateY(2px); }
    100% { opacity: 1; transform: scale(1) translateY(0); }
  }
  @keyframes glow-fill {
    0%   { opacity: 0; }
    50%  { opacity: 0.15; filter: blur(20px); }
    100% { opacity: 0.08; filter: blur(8px); }
  }

  .dias-label {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: clamp(1.4rem, 5vw, 2.8rem);
    color: var(--accent);
    opacity: 0;
    animation: fade-in 0.8s ease forwards 0.9s;
    margin-bottom: 1rem;
  }

  .sep {
    width: 60px;
    height: 1px;
    background: var(--border);
    margin: 1.2rem auto;
    position: relative;
    opacity: 0;
    animation: fade-in 0.8s ease forwards 1s;
  }
  .sep::before {
    content: '';
    position: absolute;
    left: 50%;
    top: 0;
    transform: translateX(-50%);
    width: 0;
    height: 1px;
    background: var(--accent);
    animation: sep-expand 1s ease forwards 1.2s;
  }
  @keyframes sep-expand { to { width: 100%; } }

  .phrase-wrap {
    opacity: 0;
    animation: phrase-in 1s ease forwards 1.3s;
    min-height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  @keyframes phrase-in {
    0%   { opacity: 0; transform: translateY(20px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  .phrase {
    font-size: clamp(1rem, 2.5vw, 1.3rem);
    font-weight: 300;
    line-height: 1.6;
    color: var(--text);
    max-width: 520px;
    padding: 0 1rem;
  }
  .phrase em {
    font-style: normal;
    color: var(--accent);
    font-weight: 500;
  }

  .subtitle {
    margin-top: 2rem;
    font-size: 0.68rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--muted);
    opacity: 0;
    animation: fade-in 0.8s ease forwards 1.6s;
    line-height: 2;
  }
  .subtitle span { color: var(--accent2); }

  .progress-wrap {
    width: 100%;
    max-width: 420px;
    margin-top: 1.8rem;
    opacity: 0;
    animation: fade-in 0.8s ease forwards 1.8s;
  }
  .progress-meta {
    display: flex;
    justify-content: space-between;
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.5rem;
  }
  .progress-bar {
    width: 100%;
    height: 2px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 2px;
    animation: bar-grow 1.5s ease forwards 2s;
    transform-origin: left;
    width: 0%;
  }
  @keyframes bar-grow { to { width: var(--progress-pct); } }

  .number-wrap .pulse {
    position: absolute;
    width: 100%;
    height: 100%;
    border: 1px solid var(--accent);
    opacity: 0;
    border-radius: 4px;
    animation: pulse-ring 3s ease infinite 2s;
    pointer-events: none;
  }
  @keyframes pulse-ring {
    0%   { opacity: 0; transform: scale(0.96); }
    30%  { opacity: 0.12; }
    100% { opacity: 0; transform: scale(1.06); }
  }

  /* ── SPOTIFY SECTION ────────────────────────────────────────────── */
  .spotify-section {
    width: 100%;
    max-width: 620px;
    margin-top: 3rem;
    opacity: 0;
    animation: fade-in 0.8s ease forwards 2.2s;
  }

  .spotify-header {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    margin-bottom: 1.4rem;
    justify-content: center;
  }
  .spotify-header-text {
    font-size: 0.65rem;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .spotify-header-text span { color: var(--spotify); }

  .playlists-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 0.75rem;
  }

  .playlist-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem 1.2rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    text-decoration: none;
    color: var(--text);
    transition: border-color 0.2s, background 0.2s, transform 0.15s;
    opacity: 0;
    transform: translateY(12px);
    animation: card-in 0.5s ease forwards;
  }
  .playlist-card:hover {
    border-color: var(--spotify);
    background: #1a1e1a;
    transform: translateY(-2px);
  }
  @keyframes card-in { to { opacity: 1; transform: translateY(0); } }

  .playlist-emoji {
    font-size: 1.8rem;
    flex-shrink: 0;
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #1e2420;
    border-radius: 8px;
  }

  .playlist-info { flex: 1; text-align: left; }
  .playlist-name { font-size: 0.9rem; font-weight: 500; color: var(--text); margin-bottom: 0.2rem; }
  .playlist-desc { font-size: 0.72rem; color: var(--muted); line-height: 1.4; }

  .spotify-btn {
    display: flex;
    align-items: center;
    gap: 0.3rem;
    background: var(--spotify);
    color: #000;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 0.4rem 0.75rem;
    border-radius: 20px;
    white-space: nowrap;
    flex-shrink: 0;
    transition: opacity 0.2s, transform 0.15s;
  }
  .playlist-card:hover .spotify-btn { opacity: 0.9; transform: scale(1.04); }

  .loading-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.8rem;
    padding: 2rem;
    color: var(--muted);
    font-size: 0.8rem;
    letter-spacing: 0.1em;
  }
  .loader {
    width: 28px;
    height: 28px;
    border: 2px solid var(--border);
    border-top-color: var(--spotify);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-state {
    text-align: center;
    padding: 1.5rem;
    color: var(--muted);
    font-size: 0.8rem;
    line-height: 1.6;
  }
  .retry-btn {
    margin-top: 0.8rem;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.4rem 1rem;
    border-radius: 20px;
    font-size: 0.72rem;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
    font-family: inherit;
  }
  .retry-btn:hover { border-color: var(--accent); color: var(--accent); }
</style>
</head>
<body>

<div class="particles" id="particles"></div>

<div class="container">
  <p class="label-top">Cuenta atrás · Fin del curso</p>

  <div class="number-wrap">
    <div class="pulse"></div>
    <div class="number" id="mainNumber" data-num="0">0</div>
  </div>

  <div class="dias-label" id="diasLabel">días</div>
  <div class="sep"></div>

  <div class="phrase-wrap">
    <p class="phrase" id="phrase">—</p>
  </div>

  <p class="subtitle" id="subtitle"></p>

  <div class="progress-wrap">
    <div class="progress-meta">
      <span>Inicio del curso</span>
      <span id="progressPct">0%</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>

  <!-- SECCIÓN SPOTIFY -->
  <div class="spotify-section">
    <div class="spotify-header">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="12" cy="12" r="12" fill="#1DB954"/>
        <path d="M17.25 16.5c-.2 0-.35-.07-.48-.18-2.03-1.21-4.58-1.48-7.59-.81-.18.04-.37-.07-.41-.25s.07-.37.25-.41c3.27-.74 6.07-.44 8.31.93.17.1.22.31.12.48-.07.15-.21.24-.2.24zm.96-2.3c-.25 0-.43-.1-.57-.22-2.31-1.42-5.83-1.83-8.56-1-.2.06-.42-.05-.49-.25-.06-.2.05-.42.25-.49 3.12-.95 7-.48 9.59 1.14.18.1.24.35.13.53-.1.16-.24.29-.35.29zm.09-2.37c-.07 0-.15-.02-.22-.05-2.72-1.62-7.22-1.77-9.82-.98-.23.07-.48-.06-.55-.29s.06-.48.29-.55c2.93-.89 7.78-.72 10.85 1.13.22.13.29.41.16.63-.09.15-.24.11-.71.11z" fill="white"/>
      </svg>
      <span class="spotify-header-text">Música del día en <span>Spotify</span></span>
    </div>
    <div id="playlistsContainer">
      <div class="loading-state">
        <div class="loader"></div>
        <span>Buscando la banda sonora perfecta…</span>
      </div>
    </div>
  </div>
</div>

<script>
  const frases = [
    "Hoy puede ser un gran día… o al menos un día con café.",
    "Paso a paso se llega lejos. Corriendo también, pero cansa más.",
    "Hazlo por tu yo del futuro, que bastante tendrá con sobrevivir al lunes.",
    "No necesitas tenerlo todo claro, solo empezar sin tropezar demasiado.",
    "Si el plan A falla, recuerda que el abecedario tiene muchas letras.",
    "Hoy toca brillar, aunque sea con ojeras.",
    "Pequeños avances también cuentan, incluso si son en pijama.",
    "Confía en ti: has sobrevivido al despertador.",
    "No dejes para mañana lo que puedas hacer hoy… salvo ordenar archivos.",
    "Cada día es una nueva oportunidad para hacerlo mejor o para disimular con estilo.",
    "El éxito empieza con una decisión. Y a veces con una siesta estratégica.",
    "No estás procrastinando: estás cargando creatividad.",
    "Sé constante. Las gotas llenan vasos, aunque algunas caigan en el teclado.",
    "Hoy es buen día para avanzar, aunque sea en modo tortuga.",
    "Tus sueños no se cumplen solos. Pero tampoco hace falta correr en chanclas.",
    "Respira, organiza y ataca. Pero primero guarda el documento.",
    "Puedes con esto. Ya has superado reuniones que podían haber sido un correo.",
    "La motivación va y viene; la disciplina se queda… aunque a veces llegue tarde.",
    "Hazlo con miedo, con dudas o con sueño, pero hazlo.",
    "Hoy no busques la perfección: busca no cerrar la pestaña equivocada.",
    "La actitud lo cambia todo, excepto la contraseña olvidada.",
    "Un pequeño progreso al día mantiene lejos al caos. Más o menos.",
    "No hace falta ser perfecto para empezar; de hecho, ayuda no serlo.",
    "Si hoy todo sale raro, al menos tendrás anécdota.",
    "El calendario dice que hoy toca avanzar. No le discutamos.",
    "La energía positiva no paga facturas, pero ayuda a abrir el portátil.",
    "Sigue adelante: incluso los lunes terminan pasando.",
    "No subestimes el poder de empezar cinco minutos. A veces engaña al cerebro.",
    "Tú puedes. Y si no, improvisa con confianza.",
    "Hoy ponle ganas. Si no hay ganas, ponle música."
  ];

  // Fechas
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const nowYear = today.getFullYear();

  const endCourse = new Date(nowYear, 5, 19);
  endCourse.setHours(0,0,0,0);
  const endCenter = new Date(nowYear, 5, 30);
  endCenter.setHours(0,0,0,0);

  if (endCourse < today) {
    endCourse.setFullYear(nowYear + 1);
    endCenter.setFullYear(nowYear + 1);
  }

  const msDay = 1000 * 60 * 60 * 24;
  const daysToEnd    = Math.max(0, Math.ceil((endCourse - today) / msDay));
  const daysToCenter = Math.max(0, Math.ceil((endCenter - today) / msDay));

  const dayOfYear = Math.floor((today - new Date(today.getFullYear(), 0, 0)) / msDay);
  const frase = frases[dayOfYear % frases.length];

  const courseStart = new Date(endCourse.getFullYear() - 1, 8, 1);
  const totalDays   = (endCourse - courseStart) / msDay;
  const doneDays    = (today - courseStart) / msDay;
  const pct         = Math.min(100, Math.max(0, Math.round((doneDays / totalDays) * 100)));

  // Número animado
  const numEl   = document.getElementById('mainNumber');
  const labelEl = document.getElementById('diasLabel');

  function animateCount(target, duration = 1400) {
    const start = performance.now();
    const from  = Math.max(0, target - Math.min(target, 30));
    function step(now) {
      const elapsed  = now - start;
      const progress = Math.min(1, elapsed / duration);
      const ease     = 1 - Math.pow(1 - progress, 4);
      const current  = Math.round(from + (target - from) * ease);
      numEl.textContent = current;
      numEl.dataset.num = current;
      if (progress < 1) requestAnimationFrame(step);
      else { numEl.textContent = target; numEl.dataset.num = target; }
    }
    setTimeout(() => requestAnimationFrame(step), 300);
  }
  animateCount(daysToEnd);

  // Frase
  const highlight = ['brillar','avanzar','puedes','constante','hazlo','confía','sigue','ponle','empezar'];
  let phraseHTML = frase;
  highlight.forEach(w => {
    const re = new RegExp('\\b(' + w + ')\\b', 'gi');
    phraseHTML = phraseHTML.replace(re, '<em>$1</em>');
  });
  document.getElementById('phrase').innerHTML = phraseHTML;

  // Subtítulo
  const opts = { day: 'numeric', month: 'long' };
  document.getElementById('subtitle').innerHTML =
    'Fin del curso: <span>' + endCourse.toLocaleDateString('es-ES', opts) + '</span>' +
    ' &nbsp;·&nbsp; Centro hasta: <span>' + endCenter.toLocaleDateString('es-ES', opts) + '</span>' +
    ' &nbsp;·&nbsp; Al centro: <span>' + daysToCenter + ' días</span>';

  // Progreso
  const fill = document.getElementById('progressFill');
  fill.style.setProperty('--progress-pct', pct + '%');
  document.getElementById('progressPct').textContent = pct + '%';

  // Partículas
  const pContainer = document.getElementById('particles');
  const colors = ['#f5c842', '#e8533d', '#f0ede6'];
  for (let i = 0; i < 22; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random() * 4 + 2;
    p.style.cssText =
      'width:' + size + 'px;height:' + size + 'px;left:' + (Math.random()*100) + '%;' +
      'background:' + colors[Math.floor(Math.random()*colors.length)] + ';' +
      'animation-duration:' + (10+Math.random()*20) + 's;' +
      'animation-delay:' + (Math.random()*12) + 's;opacity:0;';
    pContainer.appendChild(p);
  }

  // Fin de curso
  if (daysToEnd === 0) {
    numEl.textContent = '🎉';
    numEl.style.fontSize = 'clamp(6rem, 20vw, 12rem)';
    labelEl.textContent = '¡Curso terminado!';
    document.getElementById('phrase').textContent = '¡Lo has conseguido! Ahora a disfrutar (y a no mirar el correo).';
  }

  // ── SPOTIFY + Claude API ────────────────────────────────────────────
  async function fetchPlaylists(frase) {
    const prompt = 'Eres un experto en música y motivación. Dada esta frase motivadora:\n"' + frase + '"\n\nPropón exactamente 4 playlists de Spotify que encajen con el estado de ánimo y energía de esa frase.\n\nResponde ÚNICAMENTE con un array JSON válido, sin texto adicional, sin markdown, sin backticks. Formato exacto:\n[\n  {\n    "emoji": "🔥",\n    "name": "Nombre de la playlist",\n    "desc": "Frase corta (máx 60 chars) que describa el vibe",\n    "query": "termino de busqueda en spotify"\n  }\n]\n\nReglas:\n- emoji: uno solo, representativo del mood\n- name: nombre descriptivo de la playlist (máx 40 chars)\n- desc: descripción breve y motivadora en español\n- query: búsqueda en inglés o español para Spotify\n- Varía los géneros: mezcla upbeat, focus, chill y energía según la frase\n- No uses comillas dobles dentro de los strings';

    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    if (!response.ok) throw new Error('API error ' + response.status);
    const data = await response.json();
    const text = data.content.map(function(i) { return i.text || ''; }).join('');
    const clean = text.replace(/```json|```/g, '').trim();
    return JSON.parse(clean);
  }

  function spotifyIcon() {
    return '<svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>';
  }

  function renderPlaylists(playlists) {
    const container = document.getElementById('playlistsContainer');
    container.innerHTML = '';
    const grid = document.createElement('div');
    grid.className = 'playlists-grid';

    playlists.forEach(function(pl, i) {
      const searchUrl = 'https://open.spotify.com/search/' + encodeURIComponent(pl.query);
      const card = document.createElement('a');
      card.className = 'playlist-card';
      card.href = searchUrl;
      card.target = '_blank';
      card.rel = 'noopener noreferrer';
      card.style.animationDelay = (i * 0.1) + 's';
      card.innerHTML =
        '<div class="playlist-emoji">' + pl.emoji + '</div>' +
        '<div class="playlist-info">' +
          '<div class="playlist-name">' + pl.name + '</div>' +
          '<div class="playlist-desc">' + pl.desc + '</div>' +
        '</div>' +
        '<div class="spotify-btn">' + spotifyIcon() + ' Abrir</div>';
      grid.appendChild(card);
    });

    container.appendChild(grid);
  }

  function renderError() {
    document.getElementById('playlistsContainer').innerHTML =
      '<div class="error-state">' +
        '<p>No se pudieron cargar las sugerencias musicales.</p>' +
        '<button class="retry-btn" onclick="loadPlaylists()">↺ Reintentar</button>' +
      '</div>';
  }

  function loadPlaylists() {
    document.getElementById('playlistsContainer').innerHTML =
      '<div class="loading-state"><div class="loader"></div><span>Buscando la banda sonora perfecta…</span></div>';
    fetchPlaylists(frase)
      .then(renderPlaylists)
      .catch(function(e) { console.error(e); renderError(); });
  }

  setTimeout(loadPlaylists, 1200);
</script>
</body>
</html>
